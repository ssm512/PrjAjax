<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>busangalmetgil</title>
<style>

	ul {
	 border : 1px solid black;
	 border-radius : 10px;
	 margin : 10px;
	 
	}
</style>
</head>
<body>
	<h2>부산 갈맷길 서비스</h2>
	보고싶은 페이지<input type="number" id="page" value="1" min="1" max="maxPage" />
	<button>Get Data</button>
	<div id="output"></div>
	
	<script>
		const pageEl 		= document.querySelector('#page')
		const btnEl 		= document.querySelector('button')
		const outputEl 	= document.querySelector('#output')
		
		// button이 click 되면
		btnEl.addEventListener('click', function() {
			// alert('오타확인')
			// 서버에서 가져온다 : Get 방식으로
			let url = 'http://apis.data.go.kr/6260000/fbusangmgtourinfo/getgmgtourinfo'
			url 		+= '?ServiceKey=23c09efc86c9a031126a655710f485d14d145c75d8734d7acd4459e8101e7743' // 발급받은 개인 인증키
			url			+= '&numOfRows=10'		// 한 페이지에 몇개의 자료를 조회
			url			+= '&pageNo='+pageEl.value
			url			+= '&resultType=json'
			fetch (url)
				.then( response => response.json() )
				.then( json => {
					console.log(json)
					
					//outputEl.innerHTML=JSON.stringify(json)
					let itemList = json.response.body.items.item
					// 조회한 data로 마지막 페이지 번호를 생성
					let totalCount	 =  parseInt(json.response.body.totalCount)
					let numOfRows   =  parseInt(json.response.body.numOfRows)
					let	maxPage			= Math.ceil(totalCount / numOfRows)
					pageEl.max = maxPage
					console.log("totalCount : " + totalCount)
					console.log("numOfRows : " + numOfRows)
					console.log("maxPage : " + maxPage)
					//console.log(itemList)
					
					dataDisplay(itemList)
					} )
				.catch (error => console.log(error))
		}) // btnEl click function end
		
		function dataDisplay (itemList) {
			let html = ''
			itemList.forEach( function ( item, i ) {
				html		+=	`
					<ul>
						<li>일련번호 : ${item.uc_seq}</li>
						<li>제목 : ${item.title}</li>
						<li>장소 : ${item.name}</li>
						<li>위도 : ${item.lat}</li>
						<li>경도 : ${item.lng}</li>
						<li>소개글 : ${item.itemcntnts}</li>
						<li>코스넘버 : ${item.course}</li>
						<li>구간넘버 : ${item.gugan}</li>
						<li>종류 : ${item.cate1_nm}</li>
						<li>썸네일 : ${item.main_img_t}</li>
						<li><img src="https://www.visitbusan.net${item.main_img_t}" /></li>
						<li>메인이미지 : ${item.main_img_n}</li>
						<li><img src="https://www.visitbusan.net${item.main_img_n}" /></li>
					</ul>
				`
			} ) // forEach end
			outputEl.innerHTML=html
		} // dataDisplay function end
	</script>
</body>
</html>
